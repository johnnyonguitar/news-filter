<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>HK01 News Filter</title>
</head>
<body>
  <h2>HK01 News Filter</h2>
  <pre id="output">Loading…</pre>

<script>
async function fetchHK01() {
  const url = "https://small-breeze-2694.umjohnny.workers.dev/";

  const data = await fetch(url).then(r => r.json());

  const items = data.items.map(item => ({
    title: item.title,
    url: "https://www.hk01.com/article/" + item.articleId
  }));

  document.getElementById("output").textContent =
    JSON.stringify(items, null, 2);
}

fetchHK01();
</script>
</body>
</html>
