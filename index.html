<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>HK01 News Filter</title>
</head>
<body>
  <h2>HK01 News Filter</h2>
  <pre id="output">Loading…</pre>

<script>
async function fetchHK01() {
  const url = "https://small-breeze-2694.umjohnny.workers.dev/";

  const data = await fetch(url).then(r => r.json());

  // 你嘅 keyword
  const keywords = [
  "工業意外",
  "職安",
  "工傷",
  "意外",
  "受傷",
  "重傷",
  "昏迷",
  "倒塌",
  "塌陷",
  "墮樓",
  "高處墮下",
  "壓傷",
  "夾傷",
  "捲入",
  "觸電",
  "中暑",
  "火警",
  "爆炸",
  "被困",

  "地盤",
  "工地",
  "工程",
  "建築地盤",
  "棚架",
  "吊機",
  "起重機",
  "天秤",
  "吊臂",
  "拆卸",
  "裝修",
  "維修",
  "鋼筋",
  "模板",
  "石屎",
  "混凝土",

  "機器",
  "機械",
  "捲入機器",
  "壓斃",
  "壓死",

  "工作期間",
  "工作時",
  "工人",
  "貨車司機",
  "送貨員",
  "保安",
  "死亡",
  "墮",
  "天氣"
  ];

  // HK01 JSON 結構：items[n].data.articleId
  const items = data.items
    .map(item => ({
      title: item.data.title,
      url: "https://www.hk01.com/article/" + item.data.articleId
    }))
    .filter(item =>
      keywords.some(k => item.title.includes(k))
    );

  document.getElementById("output").textContent =
    JSON.stringify(items, null, 2);
}

fetchHK01();
</script>
</body>
</html>
