<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>HK News Filter</title>
</head>
<body>
  <h2>HK01 News Filter</h2>
  <pre id="output">Loading…</pre>

<script>
async function fetchHK01() {
  const url = "https://api.allorigins.win/raw?url=https://www.hk01.com/channel/1";

  const html = await fetch(url).then(r => r.text());

  const parser = new DOMParser();
  const doc = parser.parseFromString(html, "text/html");

  const anchors = [...doc.querySelectorAll("a")];

  const keywords = [
    "意外",
    "工業意外",
    "受傷",
    "重傷",
    "昏迷",
    "觸電",
    "中暑",
    "突發",
    "火警",
    "爆炸"
  ];

  const items = anchors
    .filter(a => a.href.includes("/article/"))
    .map(a => ({
      title: a.innerText.trim(),
      url: a.href,
    }))
    .filter(item =>
      keywords.some(k => item.title.includes(k))
    );

  document.getElementById("output").textContent = JSON.stringify(items, null, 2);
}

fetchHK01();
</script>
</body>
</html>
