<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Test Fetch</title>
</head>
<body>
  <h2>Fetch Test</h2>
  <pre id="output">Loading…</pre>

<script>
async function test() {
  const url = "https://httpbin.org/html";  // 100% 可 fetch

  const html = await fetch(url).then(r => r.text());

  const parser = new DOMParser();
  const doc = parser.parseFromString(html, "text/html");

  const h1 = doc.querySelector("h1")?.innerText || "No H1 found";

  document.getElementById("output").textContent = h1;
}

test();
</script>
</body>
</html>
