<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Test Fetch & Parse</title>
</head>
<body>
  <h2>Test: Fetch example.com and list links</h2>
  <pre id="output">Loading…</pre>

<script>
async function testFetch() {
  // 用 allorigins 抓 example.com（呢個網站肯俾人抓）
  const url = "https://api.allorigins.win/raw?url=https://example.com";

  const html = await fetch(url).then(r => r.text());

  const parser = new DOMParser();
  const doc = parser.parseFromString(html, "text/html");

  const anchors = [...doc.querySelectorAll("a")];

  const items = anchors.map(a => ({
    text: a.innerText.trim(),
    href: a.href
  }));

  document.getElementById("output").textContent = JSON.stringify(items, null, 2);
}

testFetch();
</script>
</body>
</html>
